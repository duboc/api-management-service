<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gateway Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                </svg>
                <h1 class="text-xl font-bold text-gray-900">API Gateway Manager</h1>
                <span class="px-3 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-full">mestrealvaro</span>
            </div>
            <button id="btn-refresh-all" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg" title="Refresh All">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Dashboard -->
        <section>
            <h2 class="text-lg font-semibold text-gray-900 mb-3">Dashboard</h2>
            <div id="dashboard-cards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <div class="bg-white rounded-lg shadow p-5 animate-pulse"><div class="h-8 bg-gray-200 rounded w-12 mb-2"></div><div class="h-4 bg-gray-200 rounded w-20"></div></div>
                <div class="bg-white rounded-lg shadow p-5 animate-pulse"><div class="h-8 bg-gray-200 rounded w-12 mb-2"></div><div class="h-4 bg-gray-200 rounded w-20"></div></div>
                <div class="bg-white rounded-lg shadow p-5 animate-pulse"><div class="h-8 bg-gray-200 rounded w-12 mb-2"></div><div class="h-4 bg-gray-200 rounded w-20"></div></div>
            </div>
        </section>

        <!-- API Gateway Section -->
        <section class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900">API Gateway</h2>
                <div class="flex items-center gap-2">
                    <button id="btn-test-gateway" class="px-3 py-1.5 text-sm text-white bg-purple-600 rounded-lg hover:bg-purple-700">Test API</button>
                    <button id="btn-create-api" class="px-3 py-1.5 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">Create API</button>
                    <button id="btn-create-config" class="px-3 py-1.5 text-sm text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">New Config</button>
                    <button id="btn-deploy-gateway" class="px-3 py-1.5 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">Deploy Gateway</button>
                </div>
            </div>
            <div id="gateway-section" class="px-6 py-4">
                <p class="text-gray-400 text-sm">Loading gateway status...</p>
            </div>
        </section>

        <!-- Cloud Run Proxy Section -->
        <section class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900">Cloud Run Proxy</h2>
                <div class="flex items-center gap-2">
                    <button id="btn-preview-proxy" class="px-3 py-1.5 text-sm text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">Preview Code</button>
                    <button id="btn-deploy-proxy" class="px-3 py-1.5 text-sm text-white bg-green-600 rounded-lg hover:bg-green-700">Deploy Proxy</button>
                </div>
            </div>
            <div id="proxy-section" class="px-6 py-4">
                <p class="text-gray-400 text-sm">Loading proxy status...</p>
            </div>
        </section>

        <!-- API Keys Section -->
        <section class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900">API Keys</h2>
                <button id="btn-create-key" class="px-3 py-1.5 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">Create Key</button>
            </div>
            <div id="keys-section" class="px-6 py-4">
                <p class="text-gray-400 text-sm">Loading keys...</p>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="app-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden modal-backdrop">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                <h3 id="modal-title" class="text-lg font-semibold text-gray-900">Modal</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="px-6 py-4 overflow-y-auto"></div>
            <div id="modal-footer" class="px-6 py-4 border-t border-gray-200 flex justify-end gap-2"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 z-[70] flex items-center justify-center bg-white/60 hidden">
        <div class="text-center">
            <div class="spinner mx-auto mb-3"></div>
            <p id="loading-text" class="text-sm text-gray-500"></p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[80] flex flex-col items-end"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
